<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

  <!-- Title -->
  <title>Ibrahim Zada - vCard</title>
  
  <!-- OG Tags -->
  <meta property="og:title" content="Ibrahim Zada - vCard">
  <meta property="og:image" content="../assets/img/og.png">
  <meta property="og:description" name="description" content="Save contact directly to your device!">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/img/icon.png">
  <link rel="apple-touch-icon" type="image/png" href="../assets/img/icon.png">

  <meta name="theme-color" content="#f5f7fa">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fffbe9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }

    .content {
      padding: 2rem;
    }

    .name {
      font-size: 1.75rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 0.875rem;
      font-weight: 400;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }

    .company {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    .contact-list {
      margin: 1.5rem 0 1.5rem 0;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0 0.5rem 0;
    }

    .contact-item:last-child {
      border-bottom: none;
    }

    .contact-icon {
      width: 28px;
      font-size: 1rem;
      text-align: center;
      color: #4b5563;
    }

    .contact-detail {
      flex: 1;
      font-size: 0.9rem;
    }

    .contact-detail a {
      color: #111;
      text-decoration: none;
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      background: #111;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    @media (max-width: 500px) {
      .content { padding: 1.5rem; }
      .name { font-size: 1.5rem; }
      .contact-item { padding: 0.5rem 0; }
      .btn { padding: 0.7rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="content">
      <div class="name">Ibrahim Zada</div>
      <div class="title">Project Manager</div>
      <div class="company">eSolutions Maximo</div>

      <div class="contact-list">
        <div class="contact-item">
          <div class="contact-icon">📱</div>
          <div class="contact-detail">
            <a href="tel:+966531598285">+966 53 159 8285</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">✉️</div>
          <div class="contact-detail">
            <a href="mailto:i.zada@maximo.com.sa">i.zada@maximo.com.sa</a>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">🔗</div>
          <div class="contact-detail">
            <a href="https://www.linkedin.com/in/ibrahimzada/" target="_blank" rel="noopener noreferrer">linkedin.com/in/ibrahimzada</a>
          </div>
        </div>
      </div>

      <button id="saveBtn" class="btn">Save as Contact</button>
    </div>
  </div>

  <script>

    (function() {
      const CONTACT = {
        fullName: "Ibrahim Zada",
        lastName: "Zada",
        firstName: "Ibrahim",
        title: "Project Manager",
        company: "eSolutions Maximo",
        email: "i.zada@maximo.com.sa",
        phone: "+966531598285",
      };

      function escapeVCard(str) {
        if (!str) return '';
        return str.replace(/\\/g, '\\\\').replace(/,/g, '\\,').replace(/;/g, '\\;').replace(/\n/g, '\\n');
      }

      function generateVCard() {
        const fn = escapeVCard(CONTACT.fullName);
        const lastName = escapeVCard(CONTACT.lastName);
        const firstName = escapeVCard(CONTACT.firstName);
        const title = escapeVCard(CONTACT.title);
        const company = escapeVCard(CONTACT.company);
        const email = escapeVCard(CONTACT.email);
        const phone = escapeVCard(CONTACT.phone);
        
        let vcard = "BEGIN:VCARD\r\nVERSION:3.0\r\n";
        vcard += `FN:${fn}\r\n`;
        vcard += `N:${lastName};${firstName};;;\r\n`;
        if (title) vcard += `TITLE:${title}\r\n`;
        if (company) vcard += `ORG:${company}\r\n`;
        if (phone) vcard += `TEL;TYPE=CELL,WORK:${phone}\r\n`;
        if (email) vcard += `EMAIL;TYPE=WORK,INTERNET:${email}\r\n`;
        vcard += `REV:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\r\n`;
        vcard += "END:VCARD\r\n";
        return vcard;
      }

      function downloadVCard() {
        const vcardData = generateVCard();
        const blob = new Blob([vcardData], { type: "text/vcard" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${CONTACT.fullName.replace(/\s/g, '_')}_contact.vcf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      const btn = document.getElementById('saveBtn');
      if (btn) btn.addEventListener('click', (e) => { e.preventDefault(); downloadVCard(); });
    })();
  </script>
</body>
</html>
